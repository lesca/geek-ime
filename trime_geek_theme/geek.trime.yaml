tool_bar:
  button_spacing: 5 # 按钮间距
  button_font: iconfont.ttf # 按钮字体

  # 左侧固定主按钮配置
  primary_button:
    # 背景样式设置
    background:
      type: circle           # 高亮形状 (可选值: circle|rectangle)
      corner_radius: 10      # 圆角半径
      bg_normal: 0x00        # 正常状态背景颜色
      bg_highlight: hilited_candidate_button_color  # 高亮状态背景色
      vertical_inset: 4      # 垂直方向内缩量
      horizontal_inset: 0    # 水平方向内缩量
    # 前景内容设置
    foreground:
     # style: "ic@microsoft" # 内置质感设计图标样式（以ic@开头），备选图标：
     # style: "ic@rhombus-split"
     # style: "ic@dots_horizontal"
     # style: "ic@dots-vertical"
      style: "ic@view-dashboard"
     # style: "ic@widgets"
     # style: "ic@widgets-outline"
      font_size: 11
      fg_normal: candidate_text_color  # 正常状态前景色 (本地图片不允许着色)
      # fg_highlight:        # 高亮状态前景色
      padding: 13            # 前景内容与背景边界的内边距
      # size: [120, 24]      # 视图控件宽高，非前景样式宽高
    # 按钮点击事件
    action: menu_keyboard

  hide_button: &hide_button
    foreground:
     # style: "ic@keyboard_close"
     # style: "ic@keyboard-close-outline"
      style: "ic@triangle-small-down"
      fg_normal: candidate_text_color
      font_size: 8
    action: Hide

  menu_button: &menu_button
    foreground:
     # style: "ic@earth"
     # style: "ic@cog"
      style: "ic@tune-variant"
    # 前景样式可以为空，使用默认样式，按钮将显示为 action 的 label
      font_size: 14
    action: Keyboard_func

  clipboard_button: &clipboard_button
    foreground:
     # style: "ic@bookmark-multiple"
      style: "ic@bookmark-multiple-outline"
      font_size: 14
    action: clipboard_window

  search_button: &search_button
    foreground:
      style: "ic@magnify"
      font_size: 14
    action: Bing

  ascii_mode_button: &ascii_mode_button
    foreground:
      option_styles: ["中", "En"] # 样式也可以为表，将根据 action 的 toggle 决定
      font_size: 18  # 按钮字体大小
    action: Mode_switch

  paste_button: &paste_button
    foreground:
     # style: "ic@clipboard-text"
      style: "ic@clipboard-text-outline"
      font_size: 14
    action: paste

  undo_button: &undo_button
    foreground:
     # style: "ic@reply"
      style: "ic@undo"
      font_size: 14
    action: undo

  redo_button: &redo_button
    foreground:
     # style: "ic@share"
      style: "ic@redo"
      font_size: 14
    action: redo

  # 右侧按钮列表（从右向左排列）
  buttons: [ *hide_button, *menu_button, *clipboard_button, *search_button, *ascii_mode_button, *redo_button, *undo_button ]

#键盘布局
preset_keyboards:
  default:
    author: "lesca"
    name: 26键默认布局
    width: 11.12
  #  height: 48
    ascii_mode: 0
    lock: true
    label_transform: lowercase   #键盘字母转化为小写
    keys:
      #  第一行
      - {click: q, popup: ["F1-p", "1-p", "¡"], label_symbol: '1', swipe_up: '1', hint: '!', swipe_down: '!', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: w, popup: ["F2-p", "2-p"], label_symbol: '2', swipe_up: '2', hint: '@', swipe_down: '@', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: e, popup: ["F3-p", "3-p"], label_symbol: '3', swipe_up: '3', hint: '#', swipe_down: '#', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: r, popup: ["F4-p", "4-p", "¥"], label_symbol: '4', swipe_up: '4', hint: '$', swipe_down: '$', key_back_color: bh6, key_text_color: th1, width: 10}
      - {click: t, popup: ["F5-p", "5-p", "‰", "‱"], label_symbol: '5', swipe_up: '5', hint: '%', swipe_down: '%', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: y, popup: ["F6-p", "6-p", "……", "…"], label_symbol: '6', swipe_up: '6', hint: '^', swipe_down: '^', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: u, popup: ["F7-p", "7-p"], label_symbol: '7', swipe_up: '7', hint: '&', swipe_down: '&', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: i, popup: ["F8-p", "8-p", "★", "☆"], label_symbol: '8', swipe_up: '8', hint: '*', swipe_down: '*', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: o, popup: ["F9-p", "9-p"], label_symbol: '9', swipe_up: '9', hint: '(', swipe_down: '(', key_back_color: bh1, key_text_color: th1, width: 10}
      - {click: p, popup: ["F10-p", "0-p"], label_symbol: '0', swipe_up: '0', hint: ')', swipe_down: ')', key_back_color: bh1, key_text_color: th1, width: 10}
    #  第二行
      - {width: 0, key_back_color: bh2, key_text_color: th2}
      - {click: a, popup: ["`", "·", "~", "⇥", "　"], label_symbol: '`', swipe_up: '`', hint: '⇥', swipe_down: 'Tab', key_back_color: bh2, key_text_color: th2}
      - {click: s, popup: ["+", "±", "=", "≠", "≈"], label_symbol: '+', swipe_up: '+', hint: '=', swipe_down: '=', key_back_color: bh2, key_text_color: th2}
      - {click: d, popup: ["underdash-p", "-", "——"], label_symbol: '_', swipe_up: '_', hint: '-', swipe_down: '-', key_back_color: bh2, key_text_color: th2}
      - {click: f, popup: ["×", "÷"], label_symbol: '×', swipe_up: '×', hint: ' ÷', swipe_down: '÷', key_back_color: bh2, key_text_color: th2}
      - {click: g, popup: ["?", "/", "¿"], label_symbol: '?', swipe_up: "?", hint: '/', swipe_down: '/', key_back_color: bh3, key_back_color: bh2, key_text_color: th2}
      - {click: h, popup: ["|", "backslash-p", "、"], label_symbol: '|', swipe_up: '|', hint: '\', swipe_down: '\', key_back_color: bh2, key_text_color: th2}
      - {click: j, popup: ['"', "'"], label_symbol: '""', swipe_up: '""{Left}', hint: "''", swipe_down: "''{Left}", key_back_color: bh2, key_text_color: th2}
      - {click: k, popup: ["(", ")", "[", "]"], label_symbol: '()', swipe_up: "(){Left}", hint: '[]', swipe_down: '[]{Left}', key_back_color: bh2, key_text_color: th2}
      - {click: l, popup: ["<", ">", "{", "}", "≤", "≥"], label_symbol: '{}', swipe_up: '{}{Left}', hint: '<>', swipe_down: '<>{Left}', key_back_color: bh2, key_text_color: th2}
      - {width: 0, key_back_color: bh2, key_text_color: th2}
    #  第三行
      - {click: Shift_L, 
      long_click: 'Shift_L', 
      label_symbol: ' ', 
      double_click: Shift_L3, 
      composing: delimiter, 
      hilited_key_back_color: benter, key_back_color: c1, key_text_color: th1}
      - {click: z, popup: ["Escape"], label_symbol: 'ESC', swipe_up: 'Escape', hint: 'ic@checkbox-marked-outline', swipe_down: 'select_all', symbol_text_size: "8", key_hint_offset_y: -10, key_back_color: bh3, key_text_color: th3}
      - {click: x, popup: ["F11-p"], label_symbol: 'F11', swipe_up: 'F11', hint: 'ic@content-cut', swipe_down: 'cut', symbol_text_size: "8", key_hint_offset_y: -10, key_back_color: bh3, key_text_color: th3}
      - {click: c, popup: ["F12-p", "©"], label_symbol: 'F12', swipe_up: 'F12', hint: 'ic@checkbox-multiple-blank-outline', swipe_down: 'copy', symbol_text_size: "8", key_hint_offset_y: -10, key_back_color: bh3, key_text_color: th3}
      - {click: v, popup: ["↹"], label_symbol: '↹', swipe_up: select_line, swipe_left: select_left, swipe_right: select_right, hint: 'ic@clipboard-text-outline', swipe_down: 'paste_clip', symbol_text_size: "8", key_hint_offset_y: -10, key_back_color: bh3, key_text_color: th3}
      - {click: b, popup: ["↑", "↓", "←", "→"], label_symbol: '↑', swipe_up: 'Up', hint: '↓', swipe_down: 'Down', swipe_left: 'Left', swipe_right: 'Right', key_back_color: bh3, key_text_color: th3}
      - {click: n, popup: ["⇟", "⇞"], label_symbol: '⇞', swipe_up: "Page_Up", hint: '⇟', swipe_down: 'Page_Down', swipe_left: 'Home', swipe_right: 'End', key_back_color: bh3, key_text_color: th3}
      - {click: m, popup: [":", ";"], label_symbol: ':', swipe_up: ':', hint: ';', swipe_down: ";", key_back_color: bh3, key_text_color: th3}
      - {click: BackSpace, swipe_up: 'ClearLine', swipe_down: 'Delete', swipe_left: 'ClearWord', key_back_color: c2, key_text_color: th1}
    #  第四行
      - {click: Keyboard_number, long_click: 'liquid_keyboard_default',
      composing: , label_symbol: 'ic@symbol', symbol_text_size: 14, key_symbol_offset_x: 15, key_symbol_offset_y: -47, swipe_up: 'liquid_keyboard_default', key_text_size: "20", key_back_color: c3, key_text_color: tenter, width: 14}
      - {click: Command_L, label_symbol: 'ic@keyboard-settings-outline', key_symbol_offset_y: -47, popup: [ "Theme_settings" ], swipe_up: 'Theme_settings', key_back_color: c5, key_text_color: tenter}
      - {click: Control_L, label_symbol: 'ic@palette-outline', key_symbol_offset_y: -47, popup: [ "Color_switch"], swipe_up: 'Color_switch', key_text_size: "14", key_back_color: c5, key_text_color: th4}
      - {click: space4, label_symbol: "ic@microphone-outline", key_symbol_offset_y: -47, ascii: space3, swipe_up: 'Mode_switch', swipe_down: 'Mode_switch', long_click: "VOICE_ASSIST", key_text_size: "12", symbol_text_size: 9, key_symbol_offset_x: 35, key_back_color: bkg, key_text_color: th1, width: 27}
      - {click: '.', label: '。', label_symbol: ',', swipe_up: ',', popup: ["Punct_switch"], key_back_color: bh4, key_text_color: th4}
      - {click: Alt_L, label_symbol: 'ic@web', key_symbol_offset_y: -47, popup: ["Menu", "IME_switch"], swipe_up: 'IME_switch', composing: Escape1, key_text_size: "14", key_back_color: c5, key_text_color: th4}
      - {click: Return, swipe_up: Escape, key_back_color: benter, key_text_color: tenter, width: 14}

  # letter:
  #   ascii_mode: 1
  #   lock: true
  #   __include: preset_keyboards/default
  #   __patch:
  #     - 'keys/@35/click': 'Keyboard_default1'


  number:
    author: "lesca"
    name: 数字键盘
    width: 18
   # height: 48
    ascii_mode: 1
    keys:
      # 第一行
      - {click: '%', long_click: '~', swipe_up: "~", key_text_size: "14", symbol_text_size: 14, key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: '+', long_click: '±', swipe_up: "±", key_text_size: "14", key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: 1, swipe_up: '¹', swipe_down: '₁', key_text_color: th1, key_back_color: bh1}
      - {click: 2, swipe_up: '²', swipe_down: '₂', key_text_color: th1, key_back_color: bh1}
      - {click: 3, swipe_up: '³', swipe_down: '₃', key_text_color: th1, key_back_color: bh1}
      - {click: BackSpace, swipe_up: 'ClearLine', swipe_down: 'Delete', swipe_left: 'ClearWord', key_back_color: bgn, key_text_color: 'th1', key_border: 0}
      # 第二行
      - {click: ':', long_click: ';', swipe_up: ";", key_text_size: "14", key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: '-', long_click: '_', swipe_up: "_", key_text_size: "14", key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: 4, swipe_up: '⁴', swipe_down: '₄', key_text_color: th1, key_back_color: bh1}
      - {click: 5, swipe_up: '⁵', swipe_down: '₅', key_text_color: th1, key_back_color: bh1}
      - {click: 6, swipe_up: '⁶', swipe_down: '₆', key_text_color: th1, key_back_color: bh1}
      - {click: space2, key_back_color: bgn, key_text_color: th1, key_text_size: "14", key_text_offset_y: , key_border: 0}
      # 第三行
      - {click: '\', long_click: '@', swipe_up: "@", key_text_size: "14", key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: '*', long_click: '×', swipe_up: "×", key_text_size: "14", key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: 7, swipe_up: '⁷', swipe_down: '₇', key_text_color: th1, key_back_color: bh1}
      - {click: 8, swipe_up: '⁸', swipe_down: '₈', key_text_color: th1, key_back_color: bh1}
      - {click: 9, swipe_up: '⁹', swipe_down: '₉', key_text_color: th1, key_back_color: bh1}
      - {click: Return, key_text_size: "14", key_back_color: benter, key_text_color: th1, key_border: 0}
      # 第四行
      - {click: Keyboard_last_lock, long_click: '&', swipe_up: "&", key_back_color: bgn, key_text_size: "14",key_text_color: th1, key_border: 0, width: 14}
      - {click: '/', long_click: '÷', swipe_up: "÷", key_text_size: "14", key_back_color: bgn, key_text_color: th1, key_border: 0, width: 14}
      - {click: '=', long_click: '≠', swipe_up: '≠', hint: "≈", swipe_down: "≈", key_back_color: bgn, key_text_color: th1, key_border: 0}
      - {click: 0, swipe_up: '⁰', swipe_down: '₀', key_text_color: th1, key_back_color: bh1}
      - {click: '.', long_click: '""{Left}', swipe_up: '""{Left}', key_back_color: bgn, key_text_color: th1, key_border: 0}
      - {click: Keyboard_last_lock, key_text_size: "14", key_back_color: bgn, key_text_color: tenter, key_border: 0}
      
  func:
    name: 功能
    ascii_mode: 0
    width: 25
    height: 25
    keys:
